# MLauto Configuration

llm:
  model: gpt-5-nano-2025-08-07
  temperature: 0.1
  max_tokens: 16384

execution:
  timeout: 3600           # per-execution timeout in seconds
  max_iterations: 5       # max coding iterations before stopping
  docker_image: mlauto-executor:latest  # Docker image for containerized code execution

data:
  max_chars_per_file: 768
  max_file_group_size_to_show: 5

# Path to autogluon-assistant tools_registry (for tool catalog)
# Leave null to use default relative path
tool_registry_path: null
